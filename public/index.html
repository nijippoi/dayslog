    <div id="header-tile" class="tile">
      <h1>
        <svg class="svg-icon">
          <use href="#svg-favicon"></use>
        </svg>
        <span id="header-app-name" data-label="app-name"></span>
      </h1>
    </div>
    <div id="summary-tile" class="tile">
      <div id="summary-title"></div>
      <div id="summary-range"></div>
      <div id="summary-days"></div>
    </div>
    <div id="input-tile" class="tile">
      <input id="input-style" type="hidden" value="" />
      <div class="form-control">
        <div class="label">
          <label for="input-date" data-label="date"></label>
          <span>
            <svg
              class="label-icon svg-icon"
              onclick="
                document.getElementById('input-date').value = '';
                renderSummary();
              "
            >
              <use href="#svg-undo"></use>
            </svg>
          </span>
        </div>
        <input id="input-date" type="date" onchange="renderSummary()" />
      </div>
      <div class="form-control">
        <button onclick="swapDates()">
          <svg class="svg-icon">
            <use href="#svg-swap-horiz"></use>
          </svg>
        </button>
      </div>
      <div class="form-control">
        <div class="label">
          <label for="input-target" data-label="target"></label>
          <span>
            <svg
              class="svg-icon"
              onclick="
                document.getElementById('input-target').value = '';
                renderSummary();
              "
            >
              <use href="#svg-undo"></use>
            </svg>
          </span>
        </div>
        <input id="input-target" type="date" onchange="renderSummary()" />
      </div>
      <div class="form-control">
        <div class="label">
          <label for="input-title" data-label="title"></label>
          <span>
            <svg
              class="svg-icon"
              onclick="
                document.getElementById('input-title').value = '';
                renderSummary();
              "
            >
              <use href="#svg-undo"></use>
            </svg>
          </span>
        </div>
        <input id="input-title" type="text" data-label-placeholder="title" onchange="renderSummary()" />
      </div>
      <div class="form-control">
        <div class="label">
          <label for="input-btn-share-to-x" data-label="share"></label>
        </div>
        <button id="input-btn-share-to-x" onclick="shareToX()">
          <svg class="svg-icon">
            <use href="#svg-site-x"></use>
          </svg>
        </button>
      </div>
      <div class="form-control">
        <div class="label">
          <label for="input-btn-copy-url" data-label="copy-url"></label>
        </div>
        <button id="input-btn-copy-url" onclick="copyUrl()">
          <svg class="svg-icon">
            <use href="#svg-content-copy"></use>
          </svg>
        </button>
      </div>
      <div class="form-control">
        <div class="label">
          <label for="input-btn-save" data-label="save"></label>
        </div>
        <button id="input-btn-save" onclick="saveInput()">
          <svg class="svg-icon">
            <use href="#svg-bookmark-add"></use>
          </svg>
        </button>
      </div>
    </div>
    <div id="dates-tile" class="tile">
      <h3 data-label="dates-log"></h3>
      <ul id="dates"></ul>
    </div>
    <div id="footer-tile" class="tile">
      <div>
        <a href="https://github.com/nijippoi" target="_blank">&copy;nijippoi</a>
        |
        <a href="https://github.com/nijippoi/dayslog" target="_blank">
          <svg class="svg-icon"><use href="#svg-site-github"></use></svg>Github
        </a>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
